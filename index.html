<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODKOD | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --primary: #f8e71c; --text: #ffffff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* טיקר עליון */
        .ticker { background: var(--primary); color: #000; padding: 6px 0; font-weight: 800; font-size: 14px; position: fixed; top: 0; width: 100%; z-index: 3000; overflow: hidden; white-space: nowrap; border-bottom: 2px solid #000; }
        .ticker-move { display: inline-block; animation: ticker 60s linear infinite; padding-right: 100%; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* לוגו וראש האתר */
        header { background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 50px 0 20px; text-align: center; position: sticky; top: 30px; z-index: 2000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 45px; color: #fff; text-decoration: none; letter-spacing: 4px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px var(--primary); }

        /* מבנה העמוד */
        .wrapper { display: flex; max-width: 1400px; margin: 30px auto; padding: 0 20px; gap: 25px; }
        .main-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        
        /* כרטיסיות חדשות */
        .card { background: var(--card); border: 1px solid var(--border); position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card-img { width: 100%; height: 180px; background: #1a1a1a; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-content { padding: 15px; }
        .card-tag { color: var(--primary); font-size: 11px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .card h3 { margin: 0; font-size: 17px; line-height: 1.4; font-weight: 700; }

        /* באנר צד */
        .sidebar { width: 160px; background: #0a0a0a; border: 1px solid var(--border); height: 80vh; position: sticky; top: 150px; display: flex; align-items: center; justify-content: center; }
        .sidebar-text { writing-mode: vertical-rl; color: #222; font-weight: 900; font-size: 24px; letter-spacing: 5px; }

        /* אנימציית טעינה */
        .loading { grid-column: 1 / -1; text-align: center; padding: 50px; color: var(--primary); font-family: 'Orbitron'; font-size: 20px; }
    </style>
</head>
<body>

<div class="ticker">
    <div class="ticker-move" id="ticker-content">מערכת קודקוד בסריקת מקורות מידע... ממתין לסינכרון נתונים...</div>
</div>

<header>
    <a href="#" class="logo">KOD<span>KOD</span></a>
</header>

<div class="wrapper">
    <div class="main-grid" id="news-grid">
        <div class="loading">SCANNING SATELLITE FEEDS...</div>
    </div>
    
    <aside class="sidebar">
        <div class="sidebar-text">ADVERTISING SPACE</div>
    </aside>
</div>

<script>
    async function fetchNews() {
        // שימוש במקור חלופי כדי לעקוף את חסימות NetFree
        const proxy = 'https://api.allorigins.win/get?url=';
        const target = encodeURIComponent('https://www.ynet.co.il/Integration/StoryRss2.xml');
        
        try {
            const response = await fetch(proxy + target);
            const data = await response.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            let gridHtml = '';
            let tickerText = '';

            items.forEach((item, index) => {
                const title = item.querySelector("title").textContent;
                const description = item.querySelector("description")?.textContent.replace(/<[^>]*>?/gm, '').substring(0, 100) || "";
                
                if (index < 12) {
                    gridHtml += `
                        <div class="card">
                            <div class="card-content">
                                <div class="card-tag">דיווח מיידי</div>
                                <h3>${title}</h3>
                                <p style="color:#777; font-size:13px; margin-top:10px;">${description}...</p>
                            </div>
                        </div>`;
                }
                tickerText += title + " • ";
            });

            document.getElementById('news-grid').innerHTML = gridHtml;
            document.getElementById('ticker-content').innerHTML = tickerText + tickerText;
        } catch (error) {
            document.getElementById('news-grid').innerHTML = '<div class="loading">CONNECTION ERROR - CHECK NETWORK</div>';
        }
    }

    fetchNews();
    setInterval(fetchNews, 60000); // רענון כל דקה
</script>

</body>
</html>
