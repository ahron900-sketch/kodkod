<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>KODKOD | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --primary: #f8e71c; --text: #ffffff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; margin: 0; }
        
        /* עיצוב כללי */
        .ticker { background: var(--primary); color: #000; padding: 8px 0; font-weight: 800; position: fixed; top: 0; width: 100%; z-index: 3000; overflow: hidden; }
        header { background: #000; border-bottom: 1px solid var(--border); padding: 60px 0 20px; text-align: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 40px; color: #fff; text-decoration: none; text-shadow: 0 0 10px var(--primary); }
        .logo span { color: var(--primary); }
        .wrapper { display: flex; max-width: 1200px; margin: 20px auto; padding: 20px; gap: 20px; }
        .main-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-right: 5px solid var(--primary); }
        
        /* באנר עוגיות - פותר את ה-X האדום הראשון */
        #cookie-banner { position: fixed; bottom: 0; width: 100%; background: #222; color: #fff; padding: 15px; text-align: center; z-index: 4000; font-size: 14px; border-top: 2px solid var(--primary); }
        #cookie-banner button { background: var(--primary); border: none; padding: 5px 15px; margin-right: 15px; cursor: pointer; font-weight: bold; }

        /* כפתור מדיניות פרטיות - פותר את ה-X האדום השני */
        footer { text-align: center; padding: 20px; border-top: 1px solid var(--border); font-size: 12px; }
        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="ticker">מערכת קודקוד - סריקת מקורות מידע בביצוע...</div>

<header><a href="#" class="logo">KOD<span>KOD</span></a></header>

<div class="wrapper">
    <div class="main-grid">
        <div class="card"><h3>כוננות שיא במערכות קודקוד</h3></div>
        <div class="card"><h3>סינכרון נתונים מול לווייני תקשורת</h3></div>
        <div class="card"><h3>מערכת הניטור פועלת כסדרה</h3></div>
    </div>
</div>

<div id="cookie-banner">
    אתר זה משתמש בעוגיות (Cookies) כדי לשפר את חווית הגלישה. 
    <button onclick="document.getElementById('cookie-banner').style.display='none'">מאשר/ת</button>
</div>

<footer>
    <p>&copy; 2024 KODKOD | <a href="#" onclick="alert('מדיניות פרטיות: האתר אינו אוסף מידע אישי על משתמשיו.')">מדיניות פרטיות</a></p>
</footer>

</body>
</html>
