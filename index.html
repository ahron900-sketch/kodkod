<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODKOD | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --primary: #f8e71c; --text: #ffffff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; margin: 0; }
        .ticker { background: var(--primary); color: #000; padding: 5px 0; font-weight: 800; position: fixed; top: 0; width: 100%; z-index: 3000; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 50s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        header { background: rgba(5,5,5,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 25px; z-index: 2000; padding: 20px 0; display: flex; align-items: center; justify-content: center; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 30px; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }
        .wrapper { display: flex; max-width: 1400px; margin: 40px auto; padding: 0 20px; gap: 20px; }
        .main-content { flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        .card img { width: 100%; height: 180px; object-fit: cover; opacity: 0.8; }
        .card-body { padding: 15px; }
        .ad-side { width: 160px; background: #111; border: 1px solid var(--border); height: 600px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; writing-mode: vertical-rl; }
    </style>
</head>
<body>
<div class="ticker"><div class="ticker-move" id="tickerMsg">טוען עדכונים בטחוניים בזמן אמת...</div></div>
<header><a href="#" class="logo">KOD<span>KOD</span></a></header>
<div class="wrapper">
    <main class="main-content">
        <div class="grid" id="mainGrid"></div>
    </main>
    <aside class="ad-side">AD SPACE | KODKOD</aside>
</div>
<script>
    async function fetchNews() {
        const proxy = "https://api.allorigins.win/get?url=";
        const target = encodeURIComponent('https://www.ynet.co.il/Integration/StoryRss2.xml');
        try {
            const response = await fetch(proxy + target);
            const data = await response.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            
            const newsHtml = Array.from(items).slice(0, 12).map(item => `
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1585007600263-ad1f301f2c27?w=500">
                    <div class="card-body">
                        <div style="color:var(--primary); font-size:12px; font-weight:800;">מבזק חם</div>
                        <h3 style="margin:10px 0; font-size:18px;">${item.querySelector("title").textContent}</h3>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('mainGrid').innerHTML = newsHtml;
            document.getElementById('tickerMsg').innerText = Array.from(items).slice(0, 5).map(i => i.querySelector("title").textContent).join('  •  ');
        } catch(e) { console.error("Error fetching news", e); }
    }
    fetchNews();
</script>
</body>
</html>
