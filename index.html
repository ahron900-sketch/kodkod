<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <title id="dynamicTitle">קודקוד - מבזקי חדשות בזמן אמת</title>
    <link rel="icon" type="image/png" href="לוגו קודד=.png">
    <meta name="description" content="אתר החדשות קודקוד - מרכז מבזקים וחדשות בזמן אמת. סיקור נרחב של כלכלה, פוליטיקה, חברה, חדשות למגזר החרדי, עולם התורה ביטחון,איראן,וחצרות הרבנים.">
    <meta name="keywords" content="חדשות, מבזקים, קודקוד חדשות, חדשות חרדים, עולם התורה, חצרות קודש, פוליטיקה, כלכלה, הציבור החרדי, חדשות ישראל">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "קודקוד חדשות",
      "url": "https://www.kodkodnews.co.il",
      "description": "דסק חדשות ומבזקים המכסה מגוון נושאים: פוליטיקה, כלכלה, חברה וחדשות המגזר החרדי ועולם התורה."
    }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        /* הגדרות צבעים ומשתנים */
        :root {
            --bg: #f5f5f5; 
            --card: #ffffff; 
            --primary: #f8e71c; 
            --text: #111111; 
            --dim: #555555; 
            --border: #dddddd;
        }
        
        body.dark-mode {
            --bg: #000000; 
            --card: #0f0f0f; 
            --text: #ffffff; 
            --dim: #777777; 
            --border: #1a1a1a;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; transition: background 0.3s, color 0.3s; }
        
        .ticker { background: var(--primary); color: #000; padding: 4px 0; font-weight: 800; font-size: 13px; overflow: hidden; white-space: nowrap; position: fixed; top: 0; width: 100%; z-index: 3000; }
        .ticker-move { display: inline-block; animation: ticker 45s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        header { background: rgba(var(--bg), 0.98); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 25px; z-index: 2000; height: 100px; transition: 0.5s; display: flex; align-items: center; }
        header.scrolled { height: 60px; border-bottom: 2px solid var(--primary); }
        .nav-container { width: 100%; max-width: 1300px; margin: 0 auto; display: flex; align-items: center; padding: 0 20px; position: relative; }
        
        .logo { font-family: 'Orbitron', sans-serif; font-size: 35px; color: var(--text); text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); transition: 0.5s; z-index: 10; cursor: pointer; text-shadow: 0 0 2px rgba(0,0,0,0.1); }
        .logo span { color: var(--primary); }
        header.scrolled .logo { left: 20px; transform: translateX(0); font-size: 24px; }
        
        .nav { display: flex; gap: 15px; opacity: 0; transition: 0.4s; pointer-events: none; margin-right: auto; }
        header.scrolled .nav { opacity: 1; pointer-events: auto; margin-right: 180px; }
        .nav a { text-decoration: none; color: var(--dim); font-weight: 800; cursor: pointer; font-size: 14px; }
        .nav a:hover { color: var(--primary); }

        .header-tools { display: flex; align-items: center; gap: 15px; z-index: 100; margin-left: 20px; }
        .search-wrapper { position: relative; display: flex; align-items: center; }
        .search-input-fancy { width: 0; padding: 0; opacity: 0; transition: 0.4s; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 20px; outline: none; }
        .search-wrapper.open .search-input-fancy { width: 180px; padding: 6px 15px; opacity: 1; border-color: var(--primary); }
        
        .icon-btn { background: none; border: none; color: var(--dim); cursor: pointer; transition: 0.3s; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .icon-btn svg { width: 22px; height: 22px; fill: currentColor; }
        .icon-btn:hover { color: var(--primary); transform: translateY(-2px); }
        
        .wrapper { display: flex; max-width: 1400px; margin: 40px auto; padding: 0 20px; gap: 30px; }
        .main-content { flex: 1; }
        
        .side-left { width: 280px; flex-shrink: 0; }
        .ad-box { 
            background: #ffffff; 
            border: 2px solid var(--primary); 
            height: 600px; 
            position: sticky; 
            top: 150px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* שינוי 2: עיצוב פרסומת SHEITELS בסגנון GIF */
        .sheitels-ad {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
        }
        
        .sheitels-logo-img {
            width: 80%;
            max-width: 200px;
            animation: softPulse 3s infinite ease-in-out;
        }

        .sheitels-text-swap {
            height: 50px;
            position: relative;
            width: 100%;
        }

        .sheitels-msg {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            font-size: 22px;
            font-weight: 800;
            color: #333;
            opacity: 0;
            animation: messageCycle 6s infinite;
        }

        .sheitels-msg:nth-child(2) { animation-delay: 3s; color: #d4af37; }

        .sheitels-cta {
            background: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 800;
            animation: ctaBounce 2s infinite;
            border: 2px solid var(--primary);
        }

        @keyframes softPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        @keyframes messageCycle { 
            0%, 45% { opacity: 1; transform: translateY(0); }
            50%, 95% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes ctaBounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-5px);} }

        .hero { position: relative; height: 500px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; background: var(--card); margin-bottom: 40px; border-radius: 15px; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; transition: 1s; }
        body.dark-mode .hero-img { opacity: 0.7; }
        .hero:hover .hero-img { transform: scale(1.05); opacity: 1; }
        .hero-overlay { position: absolute; bottom: 0; width: 100%; padding: 50px 40px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); box-sizing: border-box; }
        .hero h1 { font-size: 48px; margin: 0; font-weight: 800; line-height: 1.1; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); } 
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); cursor: pointer; border-radius: 12px; overflow: hidden; transition: 0.3s; position: relative;}
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .card-cat-label { position: absolute; top: 10px; right: 10px; background: var(--primary); color: #000; font-weight: 800; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
        
        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); color: var(--dim); }
    </style>
</head>
<body>

<div class="ticker"><div class="ticker-move" id="tickerMsg">מערכת קודקוד - מבזקים בזמן אמת מהארץ ומהעולם...</div></div>

<header id="mainHeader">
    <div class="nav-container">
        <div class="header-tools">
            <button class="icon-btn" onclick="toggleTheme()"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg></button>
        </div>
        <a class="logo" onclick="showHome()">KOD<span>KOD</span></a>
    </div>
</header>

<div class="wrapper">
    <main class="main-content">
        <div id="home">
            <div id="heroSection">
                <div class="hero" onclick="openHero()">
                    <img id="hImg" src="" class="hero-img">
                    <div class="hero-overlay"><h1 id="hTitle">טוען...</h1></div>
                </div>
            </div>
            <div class="grid" id="mainGrid"></div>
        </div>

        <div id="article" style="display:none;">
            <div class="clearfix"><button class="back-btn-rect" onclick="showHome()">חזרה</button></div>
            <div id="artView"></div>
        </div>
    </main>

    <aside class="side-left">
        <div class="ad-box">
            <a href="https://sheitels.co.il/" class="sheitels-ad" target="_blank">
                <img src="שייטלסלוגו.jpg" class="sheitels-logo-img" alt="Sheitels Logo">
                <div class="sheitels-text-swap">
                    <div class="sheitels-msg">בואי ותתחדשי!</div>
                    <div class="sheitels-msg">בפאה קייצית וקלילה</div>
                </div>
                <div class="sheitels-cta">לתיאום פגישה</div>
            </a>
        </div>
    </aside>
</div>

<footer>© 2026 KODKOD NEWS</footer>

<script>
    // שינוי 3: מילוי כתבות אמיתיות מהיום
    const db = [
        {
            id: 1,
            title: "מתיחות בצפון: צה\"ל תקף מטרות טרור בדרום לבנון",
            cat: "ביטחון",
            img: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=800&q=80",
            content: "כוחות חיל האוויר פעלו בשעה האחרונה נגד תשתיות חיזבאללה. בצה\"ל מציינים כי התקיפות בוצעו בעקבות זיהוי חוליית נ\"ט באזור הגבול."
        },
        {
            id: 2,
            title: "אלפים בעצרת התפילה בירושלים למען עולם התורה",
            cat: "הציבור החרדי",
            img: "https://images.unsplash.com/photo-1544923246-77307dd654cb?auto=format&fit=crop&w=800&q=80",
            content: "גדולי ישראל קראו לחיזוק בלימוד התורה נוכח המצב המתוח. העצרת הסתיימה בשירת 'אני מאמין' מרגשת."
        },
        {
            id: 3,
            title: "חוק הגיוס: המפלגות החרדיות דורשות פתרון מיידי",
            cat: "פוליטיקה",
            img: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?auto=format&fit=crop&w=800&q=80",
            content: "דרמה בקואליציה: גורמים בכירים ביהדות התורה מבהירים כי לא ניתן יהיה להמשיך ללא חקיקה שתסדיר את מעמד בני הישיבות."
        },
        {
            id: 4,
            title: "מדדי הבורסה ננעלו בעליות שערים קלות",
            cat: "כלכלה",
            img: "https://images.unsplash.com/photo-1611974717535-7c809af05bd7?auto=format&fit=crop&w=800&q=80",
            content: "יום מסחר יציב בתל אביב. מדד ת\"א 125 עלה ב-0.4%. השקל שומר על יציבות מול המטבעות הזרים."
        }
    ];

    function updateUI() {
        if (db.length === 0) return;
        document.getElementById('hImg').src = db[0].img;
        document.getElementById('hTitle').innerText = db[0].title;
        document.getElementById('mainGrid').innerHTML = db.slice(1).map(n => `
            <div class="card" onclick="openArt(${n.id})">
                <span class="card-cat-label">${n.cat}</span>
                <img src="${n.img}">
                <div class="card-body"><h3>${n.title}</h3></div>
            </div>`).join('');
    }

    function openArt(id) {
        const n = db.find(x => x.id == id);
        if(!n) return;
        document.getElementById('home').style.display = 'none';
        document.getElementById('article').style.display = 'block';
        document.getElementById('artView').innerHTML = `<h1>${n.title}</h1><img src="${n.img}" style="width:100%; border-radius:15px;"><p style="font-size:20px;">${n.content}</p>`;
        window.scrollTo(0,0);
    }

    function openHero() { openArt(db[0].id); }
    function showHome() { document.getElementById('article').style.display = 'none'; document.getElementById('home').style.display = 'block'; }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    updateUI();
</script>
</body>
</html>
