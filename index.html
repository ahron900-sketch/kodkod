<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KODKOD | COMMAND CENTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --primary: #f8e71c; --text: #ffffff; --border: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Assistant', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* טיקר זז */
        .ticker { background: var(--primary); color: #000; padding: 10px 0; font-weight: 800; position: fixed; top: 0; width: 100%; z-index: 3000; border-bottom: 2px solid #000; }
        .ticker-move { display: inline-block; animation: ticker 40s linear infinite; white-space: nowrap; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* לוגו זז וזוהר */
        header { padding: 80px 0 40px; text-align: center; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 55px; color: #fff; text-decoration: none; letter-spacing: 5px; animation: glow 2s ease-in-out infinite alternate; display: inline-block; }
        .logo span { color: var(--primary); }
        @keyframes glow { 
            from { text-shadow: 0 0 5px #fff, 0 0 10px var(--primary); transform: scale(1); }
            to { text-shadow: 0 0 20px var(--primary), 0 0 30px var(--primary); transform: scale(1.05); }
        }

        /* גריד מעוגל ומקצועי */
        .wrapper { max-width: 1300px; margin: 0 auto; padding: 20px; }
        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 25px; border-right: 8px solid var(--primary); transition: 0.4s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(248, 231, 28, 0.1); }
        .card h3 { margin: 0; font-size: 20px; line-height: 1.5; font-weight: 800; }

        /* טופס בסטייל קודקוד */
        .contact-box { background: #0a0a0a; border: 2px solid var(--primary); border-radius: 20px; padding: 40px; max-width: 600px; margin: 60px auto; position: relative; }
        .contact-box h2 { font-family: 'Orbitron'; color: var(--primary); text-align: center; margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); border-radius: 10px; color: #fff; font-family: 'Assistant'; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn { background: var(--primary); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.02); }

        /* פוטר ומדיניות */
        footer { text-align: center; padding: 40px; color: #444; border-top: 1px solid var(--border); }
        .policy-btn { color: var(--primary); cursor: pointer; font-weight: bold; text-decoration: underline; }

        /* מודאל מדיניות */
        #p-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; }
        .m-content { background:#111; border:2px solid var(--primary); border-radius:20px; width:80%; max-width:700px; margin:10% auto; padding:30px; position:relative; }
    </style>
</head>
<body>

<div class="ticker"><div class="ticker-move" id="t-text">סריקת נתונים... מערכת קודקוד מאמתת מקורות מודיעין...</div></div>

<header><a href="#" class="logo">KOD<span>KOD</span></a></header>

<div class="wrapper">
    <div class="main-grid" id="news-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px;">מתחבר ללוויין...</div>
    </div>

    <div class="contact-box">
        <h2>ADVERTISING CONTACT</h2>
        <form action="https://formspree.io/f/xeelpjwg" method="POST">
            <input type="text" name="name" placeholder="שם מלא / חברה" required>
            <input type="email" name="email" placeholder="אימייל לחזרה" required>
            <textarea name="message" rows="4" placeholder="פרטי ההצעה" required></textarea>
            <button type="submit" class="btn">שלח דיווח למערכת</button>
        </form>
    </div>
</div>

<footer>
    © 2026 KODKOD | <span class="policy-btn" onclick="document.getElementById('p-modal').style.display='block'">מדיניות פרטיות</span>
</footer>

<div id="p-modal">
    <div class="m-content">
        <span style="float:left; cursor:pointer; color:var(--primary); font-size:30px;" onclick="document.getElementById('p-modal').style.display='none'">&times;</span>
        <h2 style="color:var(--primary); font-family:'Orbitron'">PRIVACY POLICY</h2>
        <p>מערכת קודקוד שומרת על פרטיות המשתמש. המידע בטופס משמש למטרת חזרה בלבד. האתר משתמש בעוגיות טכניות לשיפור הגלישה.</p>
    </div>
</div>

<script>
    async function loadNews() {
        const proxy = 'https://api.allorigins.win/get?url=';
        const rss = encodeURIComponent('https://www.inn.co.il/Rss.aspx');
        try {
            const res = await fetch(proxy + rss);
            const data = await res.json();
            const parser = new DOMParser();
            const xml = parser.parseFromString(data.contents, "text/xml");
            const items = xml.querySelectorAll("item");
            let h = ''; let t = '';
            items.forEach((item, i) => {
                const title = item.querySelector("title").textContent;
                if(i < 9) h += `<div class="card"><h3>${title}</h3></div>`;
                t += title + " • ";
            });
            document.getElementById('news-grid').innerHTML = h;
            document.getElementById('t-text').innerText = t;
        } catch (e) {
            document.getElementById('news-grid').innerHTML = '<div class="card"><h3>מערכת קודקוד בכוננות - העדכונים יופיעו כאן בקרוב</h3></div>';
        }
    }
    loadNews();
</script>

</body>
</html>
