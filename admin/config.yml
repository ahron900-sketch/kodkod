backend:
  name: git-gateway
  branch: main # וודא שזה שם ה-branch שלך (main או master)

publish_mode: editorial_workflow # מאפשר לך לאשר כתבות לפני פרסום

media_folder: "images/uploads" # תיקייה לתמונות שתעלה מהאדמין
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "מבזקים לפרסום"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת המבזק", name: "title", widget: "string" }
      - { label: "תיאור קצר (SEO)", name: "description", widget: "string", required: false }
      - { label: "תאריך ושעה", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "צבא", "פוליטיקה", "כלכלה", "עולם", "הציבור"] }
      - { label: "תוכן המבזק", name: "body", widget: "markdown" }

  - name: "settings"
    label: "הגדרות אתר"
    delete: false # שלא יימחק בטעות
    files:
      - name: "ads"
        label: "ניהול פרסומות (באנר צד)"
        file: "content/settings/ads.json"
        fields:
          - { label: "האם הפרסומת פעילה?", name: "active", widget: "boolean", default: true }
          - { label: "תמונת הבאנר", name: "image", widget: "image" }
          - { label: "קישור בלחיצה (URL)", name: "link", widget: "string" }
