backend:
  name: github
  repo: ahron900-sketch/kodkod
  branch: main
  base_url: https://api.github.com

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "ניהול כתבות"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה ראשית", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "צבא", "פוליטיקה", "כלכלה", "עולם", "כללי"] }
      - { label: "תגיות", name: "tags", widget: "list", default: ["מבזק"] }
      - { label: "תוכן הכתבה", name: "body", widget: "markdown" }
