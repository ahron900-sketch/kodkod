backend:
  name: github
  repo: ahron900-sketch/kodkod
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pending"
    label: "כתבות מהבוט (ממתינות)"
    folder: "content/pending"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "תוכן הכתבה", name: "body", widget: "markdown" }

  - name: "news"
    label: "כתבות שפורסמו"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "תוכן הכתבה", name: "body", widget: "markdown" }
