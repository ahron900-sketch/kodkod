backend:
  name: github
  repo: ahron900-sketch/kodkod
  branch: main
  site_domain: kodkodnews.co.il

publish_mode: editorial_workflow # זה יוצר את מסך ה"המתנה לאישור" היוקרתי

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "מבזקים"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תיאור SEO", name: "description", widget: "string" }
      - { label: "תאריך", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "צבא", "פוליטיקה", "כלכלה", "עולם", "הציבור"] }
      - { label: "תוכן", name: "body", widget: "markdown" }

  - name: "ads"
    label: "ניהול פרסומות"
    files:
      - name: "sidebar_ad"
        label: "באנר צדדי"
        file: "content/settings/ads.json"
        fields:
          - { label: "באנר פעיל?", name: "active", widget: "boolean", default: true }
          - { label: "תמונת הבאנר", name: "image", widget: "image" }
          - { label: "לינק לפרסומת", name: "link", widget: "string" }
