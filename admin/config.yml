backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "מבזקים"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת הכתבה", name: "title", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "גוף הכתבה", name: "body", widget: "markdown" }
