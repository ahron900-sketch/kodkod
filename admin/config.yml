backend:
  name: github
  repo: ahron900-sketch/kodkod
  branch: main
  site_domain: kodkodnews.co.il
  display_url: https://kodkodnews.co.il

publish_mode: editorial_workflow # מפעיל את מסך האישורים (Workflow)

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "מבזקים לפרסום"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת המבזק", name: "title", widget: "string" }
      - { label: "תיאור קצר לגוגל (SEO)", name: "description", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה ראשית", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "צבא", "פוליטיקה", "כלכלה", "עולם", "הציבור"] }
      - { label: "תוכן המבזק", name: "body", widget: "markdown" }

  - name: "ads"
    label: "ניהול פרסומות"
    files:
      - name: "sidebar_ad"
        label: "באנר צדדי (AD SPACE)"
        file: "content/settings/ads.json"
        fields:
          - { label: "האם הבאנר פעיל?", name: "active", widget: "boolean", default: true }
          - { label: "תמונת הבאנר", name: "image", widget: "image" }
          - { label: "קישור (URL) בלחיצה", name: "link", widget: "string" }
