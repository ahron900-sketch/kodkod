backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "✅ מבזקים באתר (אמס)"
    folder: "content/news"
    create: true
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך", name: "date", widget: "string" }
      - { label: "מקור", name: "source", widget: "string" }
      - { label: "תמונה (לינק)", name: "image", widget: "string", required: false }
      - { label: "גוף הכתבה", name: "body", widget: "markdown" }

  - name: "pending"
    label: "⏳ להמתנה (עריכה ואישור)"
    folder: "content/pending"
    create: true
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך", name: "date", widget: "string" }
      - { label: "מקור", name: "source", widget: "string" }
      - { label: "תמונה (לינק)", name: "image", widget: "string", required: false }
      - { label: "גוף הכתבה", name: "body", widget: "markdown" }
