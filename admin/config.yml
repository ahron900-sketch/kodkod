backend:
  name: git-gateway
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "✅ מבזקים באתר (אמס)"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "string" }
      - { label: "מקור", name: "source", widget: "string", required: false }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "לינק מקורי", name: "link", widget: "string", required: false }
      - { label: "תוכן המבזק", name: "body", widget: "markdown" }

  - name: "pending"
    label: "⏳ להמתנה (שיוף ועריכה)"
    folder: "content/pending"
    create: true
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "string" }
      - { label: "מקור", name: "source", widget: "string", required: false }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "תוכן המבזק", name: "body", widget: "markdown" }
