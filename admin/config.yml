backend:
  name: github
  repo: ahron900-sketch/kodkod
  branch: main
  base_url: https://api.github.com

publish_mode: editorial_workflow
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pending"
    label: "מבזקים מהבוט (ממתינים לאישור)"
    folder: "content/pending"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת הכתבה", name: "title", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "כלכלה", "פוליטיקה", "עולם", "הציבור"] }
      - { label: "גוף הכתבה", name: "body", widget: "markdown" }

  - name: "news"
    label: "מבזקים שפורסמו באתר"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "כותרת הכתבה", name: "title", widget: "string" }
      - { label: "תאריך ושעה", name: "date", widget: "datetime", format: "DD.MM.YYYY HH:mm" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קטגוריה", name: "category", widget: "select", options: ["ביטחון", "כלכלה", "פוליטיקה", "עולם", "הציבור"] }
      - { label: "גוף הכתבה", name: "body", widget: "markdown" }
