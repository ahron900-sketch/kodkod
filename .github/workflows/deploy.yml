name: Build and Deploy Site
on:
  push:
    branches: [main]
    paths:
      - "build_site.py"
      - "assets/**"
      - "favicon.png"
      - "CNAME"
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build static site
        run: |
          python build_site.py
          cp -r assets/. public_site/assets/
          cp favicon.png public_site/favicon.png
          cp CNAME public_site/CNAME
          echo "Verifying CNAME landed in the deploy artifact:"
          cat public_site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Re-assert custom domain
        if: always()
        env:
          PAGES_TOKEN: ${{ secrets.PAGES_TOKEN }}
        run: |
          if [ -z "$PAGES_TOKEN" ]; then
            echo "PAGES_TOKEN secret not set - skipping custom domain re-assertion."
            exit 0
          fi
          curl -s -X PUT \
            -H "Authorization: Bearer $PAGES_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"cname":"kodkodnews.co.il","https_enforced":true}'
