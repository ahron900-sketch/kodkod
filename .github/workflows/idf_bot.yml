name: News Scraper Bot
on:
  schedule:
    - cron: '*/15 * * * *' # רץ כל 15 דקות
  workflow_dispatch: # מאפשר הפעלה ידנית

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install feedparser

      - name: Execute Scraper
        run: |
          python idf_scraper.py

      - name: Save and Push Changes
        run: |
          git config --global user.name "News-Bot"
          git config --global user.email "bot@kodkodnews.co.il"
          git add content/news/
          git commit -m "עדכון חדשות אוטומטי" || echo "No changes to commit"
          git push
