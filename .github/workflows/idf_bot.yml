import feedparser
import os
from datetime import datetime

def scrape_news():
    # יצירת התיקייה
    os.makedirs('content/news', exist_ok=True)
    
    # --- שורת בדיקה: יצירת קובץ ניסיון כדי לוודא שהכל עובד ---
    with open('content/news/test-file.md', 'w', encoding='utf-8') as f:
        f.write('---\ntitle: "קובץ בדיקה"\n---\nהבוט עובד ומחכה לחדשות!')
    
    # רשימת מקורות
    SOURCES = {
        "דובר צהל": "https://www.idf.il/RSS/hebrew/",
        "ynet": "https://www.ynet.co.il/Integration/StoryRss1854.xml"
    }
    
    for source_name, url in SOURCES.items():
        print(f"סורק את: {source_name}...")
        feed = feedparser.parse(url)
        
        for entry in feed.entries[:10]:
            clean_title = "".join(x for x in entry.title if x.isalnum() or x in " -")[:50]
            filename = f"content/news/{datetime.now().strftime('%Y%m%d%H%M')}-{clean_title}.md"
            
            content = f"""---
title: "{entry.title}"
date: {datetime.now().isoformat()}
source: "{source_name}"
link: "{entry.link}"
---

{entry.get('description', entry.get('summary', ''))}

[לכתבה המלאה ב-{source_name}]({entry.link})
"""
            with open(filename, 'w', encoding='utf-8') as f:
                f.write(content)
                print(f"נשמר: {filename}")

if __name__ == "__main__":
    scrape_news()
