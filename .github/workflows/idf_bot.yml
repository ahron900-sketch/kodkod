name: News Scraper Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install feedparser newspaper3k lxml_html_clean

      - name: Execute Scraper
        run: python idf_scraper.py

      - name: Save and Push Changes
        run: |
          git config --global user.name "News-Bot"
          git config --global user.email "bot@kodkodnews.co.il"
          mkdir -p content/news
          git add .
          git commit -m "עדכון חדשות מלא עם תמונות: $(date)" || exit 0
          git push origin main
