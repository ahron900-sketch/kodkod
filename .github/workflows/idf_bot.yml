name: News Scraper Bot
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Deps
        run: pip install feedparser

      - name: Scrape
        run: python idf_scraper.py

      - name: Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add content/news/
          git commit -m "update" || exit 0
          git push
